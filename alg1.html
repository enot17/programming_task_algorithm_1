<head>
    <meta charset="utf-8">
    <style>
        body {
            font-size: 20px;
            font-family: Consolas, monospace;
        }

        .answerInputText {
            margin: 10px 0;
            padding: 10px;
            width: 500px;
        }
        .answerInputText{
            font-size: 20px;
        }
        .checkBtn {
            display: block;
        }
    </style>
</head>

<body>
    <div class="rightAnswerCount">Правильно:</div>
    <div>Количество <input value="10" class="taskCountText"></div>
    <div class="questionText"></div>
    <div><input class="answerInputText"></div>
    <button class="checkBtn">Проверить</button>
    </div>
</body>
<script>

    let rightAnswerCountEl = document.querySelector(".rightAnswerCount")
    let taskCount = Number(document.querySelector(".taskCountText").value)
    let questionTextEl = document.querySelector('.questionText')
    let answerInputTextEl = document.querySelector('.answerInputText')
    let checkBtn = document.querySelector('.checkBtn')

    class UsedVar {
        constructor() {
            this.index = data.getUsed()
            this.string = data.getString(this.index)
        }

        str() {
            return this.string
        }
    }

    class Var {
        constructor() {
            this.index = data.getNew()
            this.string = data.getString(this.index)
        }

        str() {
            return this.string
        }
    }

    class Integer {
        constructor(to) {
            if (to) {
                this.value = random.numberIn(1, to)
            } else {
                this.value = random.numberIn(1, 5)
            }
        }

        str() {
            return this.value
        }
    }

    class Data {

        constructor() {
            this.reset()
        }

        reset() {
            this.letters = ["a", "b", "c", "f", "e", "w", "z", "x", "y", "n", "g", "k", "h", "q", "r", "t"]
            random.shuffle(this.letters)
            this.names = []
            this.values = []
            this.lettersIndex = 0
            this.namesIndex = 0
        }

        getNew() {
            this.names.push(this.letters[this.lettersIndex])
            this.namesIndex++
            this.lettersIndex++
            return this.namesIndex - 1
        }

        getUsed() {
            return random.numberOut(0, this.names.length)
        }

        update(index, value) {
            this.values[index] = value
        }

        getString(index) {
            return this.names[index]
        }

    }

    class Randomizer {

        shuffle(ar) {
            let index = this.numberOut(0, ar.length)
            let temp = 0
            for (let i = 0; i < ar.length; i++) {
                temp = ar[index]
                ar[index] = ar[i]
                ar[i] = temp
                index = this.numberOut(0, ar.length)
            }
        }

        choose(list) {
            return list[Math.floor(Math.random() * list.length)]
        }

        numberIn(from, to) {
            return Math.trunc((Math.random() * (to - from + 1)) + from)
        }

        numberOut(from, to) {
            return Math.trunc((Math.random() * (to - from)) + from)
        }

        mathSign() {
            return this.choose(["+", "-", "+", "+", "-", "+", "-", "-"])
        }
    }

    class Checker {

        isRight(task) {

            return true
        }
    }

    class FirstMathString {

        constructor() {
            this.sign = "+"
            this.var = new Var()
            this.a = new Integer()
            data.update(this.var.index, this.a)
        }

        str() {
            return `${this.var.str()} = ${this.a.str()}`
        }

        print() {
            console.log(this.str)
        }

    }

    class MathString {

        constructor() {
            this.sign = random.mathSign()
            let isVar = false
            if (random.numberIn(1, 100) >= 50) {
                this.a = new UsedVar()
                isVar = true
            } else {
                this.a = new Integer()
            }
            if (isVar) {
                if (random.numberIn(1, 100) >= 50) {
                    this.b = new UsedVar()
                } else {
                    this.b = new Integer()
                }
            } else {
                this.b = new UsedVar()
            }
            if (random.numberIn(1, 100) >= 50) {
                this.var = new Var()
            } else {
                this.var = new UsedVar()

            }
            data.update(this.var.index, this.calkResult())
        }

        calkResult() {
            if (this.sign == "+") {
                return this.a + this.b
            } else if (this.sign == "-") {
                return this.a - this.b
            }
        }

        str() {
            return `${this.var.str()} = ${this.a.str()} ${this.sign} ${this.b.str()}`
        }

        print() {
            console.log(this.str)
        }
    }

    class Task {

        reset() {
            data.reset()
            this.question = []
            this.question.push(new FirstMathString())
            this.makeQuestion()
            this.makeAnswer()
        }

        makeQuestion() {
            for (let i = 1; i < taskCount; i++) {
                this.question.push(new MathString())
            }
        }

        makeAnswer() {
            this.answer = []
        }

        printAnswer() {
            return this.answer.join("\n")
        }
    }

    let random = new Randomizer()
    let checker = new Checker()
    let task = new Task()
    let data = new Data()
    let rightAnswerCount = 0

    function screenUiUpdate() {
        answerInputTextEl.value = ""
        rightAnswerCountEl.textContent = `Правильно: ${rightAnswerCount}`
        questionTextEl.replaceChildren()
        for (let i = 0; i < taskCount; i++) {
            questionTextEl.insertAdjacentHTML("beforeend", `<div>${task.question[i].str()}</div>`)
        }
    }

    window.addEventListener('load', () => {
        task.reset()
        screenUiUpdate()
    })

    checkBtn.addEventListener('click', () => {
        if(checker.isRight(task)){
            rightAnswerCount++
        }else{
            rightAnswerCount=0
        }
        taskCount = Number(document.querySelector(".taskCountText").value)
        task.reset()
        screenUiUpdate()
    })
</script>
