<head>
    <meta charset="utf-8">
    <style>
        body {
            font-family: Consolas, monospace;
        }
    </style>
</head>

<body>
<div>Количество <input value="5" class="taskCountText"></div>
<div class="questionText"></div>
<button class="checkBtn">Проверить</button>
</div>
</body>
<script>

    let genPartType = {
        number: 0,
        twoVars: 1,
        single: 2
    }


    let varNames = {
        index: 0,
        names: ["a", "b", "c", "f", "e", "w", "z", "x", "y", "n", "g", "k"],

        shuffle() {

        },

        getNext() {
            this.index++
            return this.names[this.index - 1]
        }
    }

    let usedVarNames = {
        names: [],
        get(name) {
            let remainLetters = []
            for (let i = 0; i < this.names.length; i++) {
                if (this.names[i]!=name){
                    remainLetters.push(this.names[i])
                }
            }
            return randomizer.shuffle(remainLetters)
        }
    }

    class Randomizer {
        shuffle(ar) {
            let index = this.number(0, ar.length - 1)
            let temp = 0
            for (let i = 0; i < ar.length; i++) {
                temp = ar[index]
                ar[index] = ar[i]
                ar[i] = temp
                index = this.number(0, ar.length - 1)
            }
        }

        choose(list) {
            return list[Math.floor(Math.random() * list.length)]
        }

        number(from, to) {
            return Math.trunc((Math.random() * (to - from + 1)) + from)
        }

        mathSign() {
            return this.choose(["+", "-", "+", "*", "-", "+", "-", "*"])
        }

    }

    class Checker {
        clearAnswer(answerString) {
            this.answer = answerString.split("\n")
        }

        isRight(rightAnswer) {
            for (let i = 0; i < this.answer.length; i++) {
                if (rightAnswer[i] != this.answer[i]) {
                    return false
                }
            }
            return true
        }
    }


    class MathString {
        vara
        par = []
        sign
        result

        constructor(varName = "new", genPart = genPartType.single) {
            this.sign = randomizer.mathSign()
            this.createVar(varName)
            this.createMath(genPart)
        }

        createVar(isNew) {
            if (isNew) {
                this.vara = varNames.getNext()
                usedVarNames.names.push(this.vara)
            } else {
                this.vara = usedVarNames.get()
            }
        }

        createMath(genPart) {
            switch (genPart) {
                case genPartType.number: {
                    for (let i = 0; i < 2; i++) {
                        this.par[i] = randomizer.number(2, 4)
                    }
                }
                    break
                case genPartType.single: {
                    for (let i = 0; i < 2; i++) {
                        if (randomizer.number(1, 100) > 50) {
                            this.par[i] = usedVarNames.get(this.vara)
                        } else {
                            this.par[i] = randomizer.number(2, 4)
                        }

                    }
                    if (randomizer.number(1, 100) > 50) {
                        this.left = usedVarNames.get(this.vara)
                        this.right = randomizer.number(1, 4)
                    } else {
                        this.left = randomizer.number(1, 4)
                        this.right = usedVarNames.get(this.vara)
                    }
                }
                    break
                case genPartType.twoVars: {

                }
                    break
            }
        }

        print() {
            console.log(`${this.vara} = ${this.left} ${this.sign} ${this.right}`)
        }
    }

    class Task {

        constructor(count) {
            this.count = Number(count)
        }

        reset() {
            randomizer.shuffle(varNames.names)
            usedVarNames.names = []
            this.question = []
            this.makeQuestion()
            this.makeAnswer()
        }

        makeQuestion() {
            this.question.push(new MathString("new", genPartType.both))
            this.question.push(new MathString())
            for (let i = 2; i < this.count; i++) {
                this.question.push(new MathString())
            }
            for (let i = 0; i < this.count; i++) {
                this.question[i].print()
            }
        }

        makeAnswer() {
            this.answer = []
        }

        printAnswer() {
            return this.answer.join("\n")
        }
    }

    let taskCount = document.querySelector(".taskCountText")
    let questionText = document.querySelector('.questionText')
    let answerCont = document.querySelector('.answerCont')
    let answerCountText = document.querySelector('.answerCountText')
    let answerInputText = document.querySelector('.answerInputText')
    let checkBtn = document.querySelector('.checkBtn')

    let randomizer = new Randomizer()
    let checker = new Checker()
    let task = new Task(taskCount.value)

    function screenUiUpdate() {
        questionText.text = task.question
    }

    function btnUiUpdate() {

    }

    window.addEventListener('load', () => {
        task.reset(taskCount.value)
        screenUiUpdate()
    })

    checkBtn.addEventListener('click', () => {
        answerChecker.clearAnswer(answerInputText.value)
        if (answerChecker.isRight(task.answer)) {
            answerCont.style.borderColor = "green"
        } else {
            answerCont.style.borderColor = "red"
        }
        btnUiUpdate()
        task.reset()
        screenUiUpdate()
    })
</script>
