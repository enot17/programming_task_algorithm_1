<head>
    <meta charset="utf-8">
    <style>
        body {
            font-family: Consolas, monospace;
        }
    </style>
</head>

<body>
    <div>Количество <input value="5" class="taskCountText"></div>
    <div class="questionText"></div>
    <button class="checkBtn">Проверить</button>
    </div>
</body>
<script>



    let genPartType = {
        left:-1,
        both:0,
        right:1
    }


    let varNames = {
        index: 0,
        names: ["a", "b", "c", "d", "e", "w", "z", "x", "y", "n", "m", "k"],
        get(){
            this.index++
            return this.names[this.index-1]
        }
    }

    let usedVarNames = {
        names:[],
        get(){
            return randomizer.choose(this.names)
        },
        add(){
            this.names.push(varNames.get())
        }
    }

    class Randomizer {
        shuffle(ar) {
            let index = this.number(0, ar.length - 1)
            let temp = 0
            for (let i = 0; i < ar.length; i++) {
                temp = ar[index]
                ar[index] = ar[i]
                ar[i] = temp
                index = this.number(0, ar.length - 1)
            }
        }

        word(from, to) {
            let varLen = this.getNumber(from, to)
            let varName = new Array(varLen)
            for (let i = 0; i < varLen; i += 2) {
                varName[i] = this.getConsonant()
            }
            for (let i = 1; i < varLen; i += 2) {
                varName[i] = this.getVowel()
            }
            return varName.join("")
        }

        choose(list) {
            return list[Math.floor(Math.random() * list.length)]
        }

        letter() {
            let letters = ["a", "b", "c", "d", "e", "w", "z", "x", "y", "n", "m", "k"]
            return letters[Math.floor(Math.random() * letters.length)]
        }

        vowel() {
            let letters = ["a", "e", "i", "o", "u"]
            return letters[Math.floor(Math.random() * letters.length)]
        }

        consonant() {
            let letters = ["b", "c", "d", "g", "h", "j", "k", "l", "m", "n", "p", "q", "r", "s", "t", "v", "w", "x", "z"]
            return letters[Math.floor(Math.random() * letters.length)]
        }

        number(from, to) {
            return Math.trunc((Math.random() * (to - from + 1)) + from)
        }

        float(from, to) {
            let w = this.getNumber(from, to)
            let e = this.getNumber(10, 99)
            return `${w}.${e}`
        }

        bool() {
            return Math.random() > 0.5
        }

        logicalSign() {
            let sign = this.getChoice([">", ">", ">=", "<", "<", "<=", "!=", "=="])
            let word = ""
            switch (sign) {
                case "<":
                    word = "меньше"
                    break
                case ">":
                    word = "больше"
                    break
                case "<=":
                    word = "меньше или равно"
                    break
                case ">=":
                    word = "больше или равно"
                    break
                case "==":
                    word = "равно"
                    break
                case "!=":
                    word = "не равно"
                    break
            }
            return [sign, word]
        }

        mathSign() {
            return this.choose(["+", "-", "+", "*", "-", "+", "-", "*"])
        }

        funcFromSign(sign) {
            switch (sign) {
                case "+":
                    return "plus"
                case "-":
                    return "minus"
                case "*":
                    return "mul"
            }
            return "error"
        }
    }

    class Checker {
        clearAnswer(answerString) {
            this.answer = answerString.split("\n")
        }

        isRight(rightAnswer) {
            for (let i = 0; i < this.answer.length; i++) {
                if (rightAnswer[i] != this.answer[i]) {
                    return false
                }
            }
            return true
        }
    }



    class MathString{
        vara
        left
        sign
        right 
        result
        
        constructor(varName = "new", genPart=genPartType.both){
            this.sign = randomizer.mathSign()
            if(varName == "new"){
                this.vara = varNames.getNext()
            }else{
                this.vara = varName
            }
            switch(genPart){
                case genPartType.left:{
                    this.a = usedVarNames.get()
                    this.b = randomizer.number(1,4)
                    }break;
                case genPartType.both:{
                    this.a = randomizer.number(2,4)
                    this.b = randomizer.number(1,4)
                    }break;
                case genPartType.right:{
                    this.a = randomizer.number(2,4)
                    this.b = usedVarNames.get()
                    }break;
            }
        }
    }

    class Task {

        constructor() {
            randomizer.shuffle(varNames.names)
            this.questions = []
        }

        reset() {
            this.mathStrings = []
            this.mathStrings.push(MathString("new",))
            this.makeQuestion()
            this.makeAnswer()
        }

        makeQuestion(count = 5) {
            this.questions.push(`${this.names[this.varIndex]} = ${this.values[this.varIndex]}`)
            let number = 0
            while (number < count) {
                this.questions.push(this.makeOneMath())
                number++
            }
            console.log(this.questions)
        }

        makeOneMath() {
            let res = 0
            let memA = 0
            let indexA = -1
            let sign = 0
            let memB = 0
            let indexB = -1
            let 
            if (randomizer.number(1, 100) > 50) {
                res = this.varNames[this.varIndex]
                this.names.push(res)
                this.index++
            } else {
                res = randomizer.choose(this.names)
            }

            if (randomizer.number(1, 100) > 50) {
                isVarInString = true
                memA = randomizer.choose(this.names)
            } else {
                memA = randomizer.number(2, 4)
            }
            sign = randomizer.mathSign()
            if (isVarInString) {
                if (randomizer.number(1, 100) > 50) {
                    memB = randomizer.choose(this.names)
                } else {
                    memB = randomizer.number(2, 4)
                }
            } else {
                memB = randomizer.choose(this.names)
            }

            return `${res} = ${memA} ${sign} ${memB}`
        }

        makeAnswer() {
            this.answer = []
        }

        printAnswer() {
            return this.answer.join("\n")
        }
    }

    let taskCount = document.querySelector(".taskCountText")
    let questionText = document.querySelector('.questionText')
    let answerCont = document.querySelector('.answerCont')
    let answerCountText = document.querySelector('.answerCountText')
    let answerInputText = document.querySelector('.answerInputText')
    let checkBtn = document.querySelector('.checkBtn')

    let randomizer = new Randomizer()
    let checker = new Checker()
    let task = new Task()

    function screenUiUpdate() {
        questionText.text = task.question
    }

    function btnUiUpdate() {

    }

    window.addEventListener('load', () => {
        task.reset(taskCount.value)
        screenUiUpdate()
    })

    checkBtn.addEventListener('click', () => {
        answerChecker.clearAnswer(answerInputText.value)
        if (answerChecker.isRight(task.answer)) {
            answerCont.style.borderColor = "green"
        } else {
            answerCont.style.borderColor = "red"
        }
        btnUiUpdate()
        task.reset()
        screenUiUpdate()
    })
</script>
