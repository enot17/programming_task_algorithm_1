<head>
    <meta charset="utf-8">
    <style>
        body {
            font-size: 20px;
            font-family: Consolas, monospace;
        }

        .answerInputText {
            margin: 10px 0;
            padding: 10px;
            width: 500px;
        }

        .rightAnswerText {
            display: flex;
            gap: 20px;
        }

        .answerInputText {
            font-size: 20px;
        }

        .checkBtn {
            display: block;
        }
    </style>
</head>

<body>
    <div class="rightAnswerCount">Правильно:</div>
    <div>Количество <input value="10" class="taskCountText"></div>
    <div class="questionText"></div>
    <div><input class="answerInputText"></div>
    <button class="checkBtn">Проверить</button>
    <div class="rightAnswerText">
        <div class="playerAnswer"></div>
        <div class="computerAnswer"></div>
    </div>
    </div>
</body>
<script>
    let rightAnswerCountEl = document.querySelector(".rightAnswerCount")
    let rightAnswerTextEl = document.querySelector(".rightAnswerText")
    let playerAnswerEl = document.querySelector(".playerAnswer")
    let computerAnswerEl = document.querySelector(".computerAnswer")

    let taskCount = Number(document.querySelector(".taskCountText").value)
    let questionTextEl = document.querySelector('.questionText')
    let answerInputTextEl = document.querySelector('.answerInputText')
    let checkBtn = document.querySelector('.checkBtn')

    class UsedVar {
        constructor() {
            [this.index, this.string, this.value] = data.getUsed()
        }

        setValue(value) {
            data.values[this.index] = value
        }

        str() {
            return this.string
        }
    }

    class NewVar {
        constructor() {
            [this.index,this.string] = data.getNew()
        }

        setValue(value) {
            data.values[this.index] = value
        }

        str() {
            return this.string
        }
    }

    class Integer {
        constructor(to) {
            if (to) {
                this.value = random.numberIn(1, to)
            } else {
                this.value = random.numberIn(1, 5)
            }
        }

        str() {
            return this.value
        }
    }

    class Data {

        constructor() {
            this.reset()
        }

        reset() {
            this.letters = ["a", "b", "c", "f", "e", "w", "z", "x", "y", "n", "g", "k", "h", "q", "r", "t"]
            random.shuffle(this.letters)
            this.names = []
            this.values = []
            this.lettersIndex = 0
            this.namesIndex = 0
        }

        getNew() {
            this.names.push(this.letters[this.lettersIndex])
            this.namesIndex++
            this.lettersIndex++
            return [this.namesIndex - 1,this.names[this.namesIndex-1]]
        }

        getUsed() {
            let index = random.numberOut(0, this.names.length)
            return [index, this.names[index], this.values[index]]
        }
    }

    class Randomizer {

        shuffle(ar) {
            let index = this.numberOut(0, ar.length)
            let temp = 0
            for (let i = 0; i < ar.length; i++) {
                temp = ar[index]
                ar[index] = ar[i]
                ar[i] = temp
                index = this.numberOut(0, ar.length)
            }
        }

        choose(list) {
            return list[Math.floor(Math.random() * list.length)]
        }

        numberIn(from, to) {
            return Math.trunc((Math.random() * (to - from + 1)) + from)
        }

        numberOut(from, to) {
            return Math.trunc((Math.random() * (to - from)) + from)
        }

        mathSign() {
            return this.choose(["+", "-", "+", "+", "-", "+", "-", "-"])
        }
    }

    class Checker {


        readInput(obj) {
            this.input = obj.value.split(" ")
        }

        isRight(task) {
            if (this.input.length != task.answer.length) return false
            for (let i = 0; i < this.input.length; i++) {
                if (this.input[i] != task.answer[i]) return false
            }
            return true
        }
    }

    class FirstMathString {

        constructor() {
            this.sign = "+"
            this.var = new NewVar()
            this.a = new Integer()
            this.var.setValue(this.a.value)
        }

        str() {
            return `${this.var.str()} = ${this.a.str()}`
        }

        print() {
            console.log(this.str)
        }

    }

    class MathString {

        constructor() {
            this.sign = random.mathSign()
            let isVar = false
            if (random.numberIn(1, 100) >= 50) {
                this.a = new UsedVar()
                isVar = true
            } else {
                this.a = new Integer()
            }
            if (isVar) {
                if (random.numberIn(1, 100) >= 50) {
                    this.b = new UsedVar()
                } else {
                    this.b = new Integer()
                }
            } else {
                this.b = new UsedVar()
            }
            if (random.numberIn(1, 100) >= 50) {
                this.var = new NewVar()
            } else {
                this.var = new UsedVar()

            }
            let temp = this.calkResult()
            this.var.setValue(this.calkResult())
            console.log(data.names);
            console.log(data.values);
        }

        calkResult() {
            if (this.sign == "+") {
                return this.a.value + this.b.value
            } else if (this.sign == "-") {
                return this.a.value - this.b.value
            }
        }

        str() {
            return `${this.var.str()} = ${this.a.str()} ${this.sign} ${this.b.str()}`
        }

        print() {
            console.log(this.str)
        }
    }

    class Task {

        reset() {
            data.reset()
            this.question = []
            this.question.push(new FirstMathString())
            this.makeQuestion()
            this.makeAnswer()
        }

        makeQuestion() {
            for (let i = 1; i < taskCount; i++) {
                this.question.push(new MathString())
                console.log(data.names);
                console.log(data.values);
            }
        }

        makeAnswer() {
            this.answer = []
            let i = 0
            for(let i=0;i<data.names.length;i++){
                this.answer.push(`${data.names[i]}=${data.values[i]}`)
            }
        }

        printAnswer() {
            return this.answer.join(" ")
        }
    }

    let random = new Randomizer()
    let checker = new Checker()
    let task = new Task()
    let data = new Data()
    let rightAnswerCount = 0

    function printTasks() {
        answerInputTextEl.value = ""
        rightAnswerCountEl.textContent = `Правильно: ${rightAnswerCount}`
        questionTextEl.replaceChildren()
        for (let i = 0; i < taskCount; i++) {
            questionTextEl.insertAdjacentHTML("beforeend", `<div>${task.question[i].str()}</div>`)
        }
    }

    function printRightAnswers() {
        playerAnswerEl.replaceChildren()
        for (let i = 0; i < checker.input.length; i++) {
            playerAnswerEl.insertAdjacentHTML("beforeend", `<div>${checker.input[i]}</div>`)
        }
        computerAnswerEl.replaceChildren()
        for (let i = 0; i < task.answer.length; i++) {
            computerAnswerEl.insertAdjacentHTML("beforeend", `<div>${task.answer[i]}</div>`)
        }
    }

    window.addEventListener('load', () => {
        task.reset()
        printTasks()
    })

    checkBtn.addEventListener('click', () => {
        task.makeAnswer()
        console.log(data.names);
        console.log(data.values);
        console.log(task.answer);
        checker.readInput(answerInputTextEl)
        if (checker.isRight(task)) {
            rightAnswerCount++
        } else {
            rightAnswerCount = 0
        }
        taskCount = Number(document.querySelector(".taskCountText").value)
        printRightAnswers()
        task.reset()
        printTasks()
    })
</script>
